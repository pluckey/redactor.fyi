<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      color: #333;
      background: #fafafa;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    h1 { font-size: 14px; font-weight: 500; }
    .dot { color: #c0392b; }
    .mode-select {
      font-size: 10px;
      padding: 2px 4px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
    }
    .section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin: 12px 0 6px;
    }
    .redactor-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .redactor-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .redactor-info { flex: 1; }
    .redactor-name { font-weight: 500; font-size: 11px; }
    .redactor-desc { font-size: 10px; color: #999; }
    .toggle { cursor: pointer; }
    .toggle input { display: none; }
    .toggle-track {
      width: 28px;
      height: 16px;
      background: #ddd;
      border-radius: 8px;
      position: relative;
      transition: background 0.15s;
    }
    .toggle input:checked + .toggle-track { background: #27ae60; }
    .toggle-track::after {
      content: '';
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: left 0.15s;
    }
    .toggle input:checked + .toggle-track::after { left: 14px; }
    .status {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      font-size: 10px;
      color: #888;
    }
    .privacy {
      margin-top: 8px;
      font-size: 9px;
      color: #bbb;
      line-height: 1.4;
    }
    .privacy a { color: #999; }
    .key-section { margin-top: 10px; }
    .key-input {
      width: 100%;
      padding: 5px 6px;
      font-size: 10px;
      font-family: monospace;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      color: #333;
      box-sizing: border-box;
    }
    .key-input::placeholder { color: #bbb; }
    .key-input:focus { outline: none; border-color: #999; }
    .key-status {
      font-size: 9px;
      margin-top: 4px;
      color: #999;
    }
    .key-status.ok { color: #27ae60; }
    .key-status.missing { color: #c0392b; }

    /* Log panel */
    .log-toggle {
      font-size: 9px;
      color: #bbb;
      cursor: pointer;
      user-select: none;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .log-toggle:hover { color: #999; }
    .log-arrow { font-size: 8px; transition: transform 0.15s; display: inline-block; }
    .log-arrow.open { transform: rotate(90deg); }
    .log-badge {
      background: #c0392b;
      color: #fff;
      font-size: 8px;
      font-weight: 600;
      padding: 0 4px;
      border-radius: 3px;
      min-width: 14px;
      text-align: center;
    }
    .log-panel {
      display: none;
      margin-top: 6px;
      max-height: 160px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 4px;
      background: #fff;
    }
    .log-panel.open { display: block; }
    .log-entry {
      font-size: 9px;
      font-family: monospace;
      padding: 4px 6px;
      border-bottom: 1px solid #f5f5f5;
      color: #666;
      line-height: 1.4;
      word-break: break-all;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-ts { color: #bbb; margin-right: 4px; }
    .log-empty {
      font-size: 9px;
      color: #ccc;
      padding: 8px;
      text-align: center;
    }
    .log-clear {
      font-size: 8px;
      color: #bbb;
      cursor: pointer;
      margin-left: auto;
    }
    .log-clear:hover { color: #c0392b; }
  </style>
</head>
<body>
  <div class="header">
    <h1>redactor<span class="dot">.</span>fyi</h1>
    <select id="mode" class="mode-select">
      <option value="highlight">Highlight</option>
      <option value="underline">Underline</option>
      <option value="redact">Redact</option>
    </select>
  </div>

  <div class="section-label">Redactors</div>
  <div id="redactors"></div>

  <div class="section-label">Active on</div>
  <div id="domains"></div>

  <div class="section-label">API Key</div>
  <div class="key-section">
    <input type="password" id="apiKey" class="key-input" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
    <div id="keyStatus" class="key-status missing">No key configured</div>
  </div>

  <div class="status" id="status">Ready</div>
  <div class="privacy">
    Calls the Anthropic API directly with your key. Response text is sent to api.anthropic.com for analysis. Nothing is stored.
  </div>

  <div class="log-toggle" id="logToggle">
    <span class="log-arrow" id="logArrow">&#9654;</span>
    Error log
    <span class="log-badge" id="logBadge" style="display:none">0</span>
    <span class="log-clear" id="logClear">clear</span>
  </div>
  <div class="log-panel" id="logPanel"></div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
